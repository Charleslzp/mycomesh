  MYCOMESH_POOL_PUBLIC_URL: ${MYCOMESH_POOL_PUBLIC_URL:-http://127.0.0.1:9800}
  MYCOMESH_PROVIDER_POOL_URL: ${MYCOMESH_PROVIDER_POOL_URL:-http://bridge:9800}
  MYCOMESH_PROVIDER_ADVERTISE_HOST: ${MYCOMESH_PROVIDER_ADVERTISE_HOST:-provider}
  MYCOMESH_PROVIDER_AGENT: ${MYCOMESH_PROVIDER_AGENT:-coder}
