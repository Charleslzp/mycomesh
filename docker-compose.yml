  bridge:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["bridge", "public-node"]
    networks:
      - bridge-net
    user: "10001:10001"
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 768m
    cpus: "2.0"
    logging: *production-logging
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: /data
    environment:
      MYCOMESH_NETWORK_PROFILE: ${MYCOMESH_NETWORK_PROFILE:-local}
      MYCOMESH_NETWORK_ID: ${MYCOMESH_NETWORK_ID:-mycomesh-local}
      MYCOMESH_POOL_CORS_ALLOWED_ORIGINS: ${MYCOMESH_POOL_CORS_ALLOWED_ORIGINS:-}
      MYCOMESH_POOL_PUBLIC_URL: ${MYCOMESH_POOL_PUBLIC_URL:-http://127.0.0.1:9800}
      MYCOMESH_PUBLIC_NODE_STRICT: ${MYCOMESH_PUBLIC_NODE_STRICT:-false}
      MYCOMESH_BRIDGE_BIND_ADDRESS: ${MYCOMESH_BRIDGE_BIND_ADDRESS:-127.0.0.1}
      MYCOMESH_BRIDGE_ADMISSION_MODE: ${MYCOMESH_BRIDGE_ADMISSION_MODE:-allowlist}
      MYCOMESH_BRIDGE_PROVIDER_PUBLIC_KEYS: ${MYCOMESH_BRIDGE_PROVIDER_PUBLIC_KEYS:-}
      MYCOMESH_BRIDGE_REPUTATION_SIGNER_PUBLIC_KEYS: ${MYCOMESH_BRIDGE_REPUTATION_SIGNER_PUBLIC_KEYS:-}
      MYCOMESH_BRIDGE_TRUST_PROXY_HEADERS: ${MYCOMESH_BRIDGE_TRUST_PROXY_HEADERS:-false}
      MYCOMESH_BRIDGE_TRUSTED_RELAY_ORIGINS: ${MYCOMESH_BRIDGE_TRUSTED_RELAY_ORIGINS:-}
      MYCOMESH_BRIDGE_EXTRA_ARGS: ${MYCOMESH_BRIDGE_EXTRA_ARGS---skip-direct-address-verification --allow-any-reputation-signer}
      MYCO_DEPLOYMENT: ${MYCO_DEPLOYMENT:-/app/deployments/sepolia-myco-v3.json}
    ports:
      - "127.0.0.1:9800:9800"
    volumes:
      - mycomesh-bridge-data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      public-node-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, os, urllib.request; value=json.load(urllib.request.urlopen('http://127.0.0.1:9800/health', timeout=3)); assert value.get('ok') is True; assert value.get('network_profile') == os.environ.get('MYCOMESH_NETWORK_PROFILE', 'local')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu
        umask 077

        profile="$${MYCOMESH_NETWORK_PROFILE:-local}"
        extra_args="$${MYCOMESH_BRIDGE_EXTRA_ARGS-}"
        set -- python -m gateway bridge serve \
          --host 0.0.0.0 \
          --port 9800 \
          --public-url "$${MYCOMESH_POOL_PUBLIC_URL:-http://127.0.0.1:9800}" \
          --network-profile "$$profile"

        if [ "$${MYCOMESH_PUBLIC_NODE_STRICT:-false}" = "true" ] && [ "$$profile" != "testnet" ]; then
          echo "bridge preflight: public-node requires MYCOMESH_NETWORK_PROFILE=testnet" >&2
          exit 64
        fi

        case "$$profile" in
          local)
            set -f
            exec "$$@" $$extra_args
            ;;
          testnet)
            [ -z "$$extra_args" ] || {
              echo "bridge preflight: MYCOMESH_BRIDGE_EXTRA_ARGS must be empty in testnet" >&2
              exit 64
            }
            [ -r "$${MYCO_DEPLOYMENT:?bridge preflight: MYCO_DEPLOYMENT is required}" ] || {
              echo "bridge preflight: deployment record is not readable: $$MYCO_DEPLOYMENT" >&2
              exit 64
            }
            if [ "$${MYCOMESH_PUBLIC_NODE_STRICT:-false}" = "true" ]; then
              [ "$${MYCOMESH_POOL_CORS_ALLOWED_ORIGINS:-}" = "https://mycomesh.xyz,https://app.mycomesh.xyz,http://127.0.0.1:8110,http://localhost:8110" ] || {
                echo "bridge preflight: public-node browser origins must be the canonical mycomesh.xyz origins" >&2
                exit 64
              }
              case "$${MYCOMESH_BRIDGE_BIND_ADDRESS:-}" in
                127.0.0.1) ;;
                *)
                  echo "bridge preflight: public-node Bridge control port must bind to 127.0.0.1" >&2
                  exit 64
                  ;;
              esac
              [ "$${MYCOMESH_BRIDGE_TRUST_PROXY_HEADERS:-false}" = "true" ] || {
                echo "bridge preflight: public-node requires trusted headers from its loopback Nginx proxy" >&2
                exit 64
              }
            fi

            case "$${MYCOMESH_BRIDGE_TRUST_PROXY_HEADERS:-false}" in
              true) set -- "$$@" --trust-proxy-headers ;;
              false) ;;
              *)
                echo "bridge preflight: MYCOMESH_BRIDGE_TRUST_PROXY_HEADERS must be true or false" >&2
                exit 64
                ;;
            esac

            reputation_count=0
            old_ifs="$$IFS"
            IFS=,
            for public_key in $${MYCOMESH_BRIDGE_REPUTATION_SIGNER_PUBLIC_KEYS:-}; do
              [ -n "$$public_key" ] || continue
              set -- "$$@" --reputation-signer-public-key "$$public_key"
              reputation_count=$$((reputation_count + 1))
            done
            IFS="$$old_ifs"
            [ "$$reputation_count" -gt 0 ] || {
              echo "bridge preflight: at least one reputation signer public key is required" >&2
              exit 64
            }

            trusted_relay_count=0
            old_ifs="$$IFS"
            IFS=,
            for relay_origin in $${MYCOMESH_BRIDGE_TRUSTED_RELAY_ORIGINS:-}; do
              [ -n "$$relay_origin" ] || continue
              set -- "$$@" --trusted-relay-origin "$$relay_origin"
              trusted_relay_count=$$((trusted_relay_count + 1))
            done
            IFS="$$old_ifs"

            case "$${MYCOMESH_BRIDGE_ADMISSION_MODE:-allowlist}" in
              any-signed)
                set -- "$$@" --allow-any-signed-provider
                [ "$$trusted_relay_count" -gt 0 ] || {
                  echo "bridge preflight: any-signed admission requires a trusted Relay origin" >&2
                  exit 64
                }
                ;;
              allowlist)
                provider_count=0
                old_ifs="$$IFS"
                IFS=,
                for public_key in $${MYCOMESH_BRIDGE_PROVIDER_PUBLIC_KEYS:-}; do
                  [ -n "$$public_key" ] || continue
                  set -- "$$@" --provider-public-key "$$public_key"
                  provider_count=$$((provider_count + 1))
                done
                IFS="$$old_ifs"
                [ "$$provider_count" -gt 0 ] || {
                  echo "bridge preflight: allowlist admission requires a Provider public key" >&2
                  exit 64
                }
                ;;
              *)
                echo "bridge preflight: admission mode must be allowlist or any-signed" >&2
                exit 64
                ;;
            esac
            exec "$$@"
            ;;
          *)
            echo "bridge preflight: unsupported network profile: $$profile" >&2
            exit 64
            ;;
        esac

  relay:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["relay", "public-node"]
    networks:
      - relay-net
    user: "10001:10001"
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 768m
    cpus: "2.0"
    logging: *production-logging
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: /data
    environment:
      MYCOMESH_NETWORK_PROFILE: ${MYCOMESH_NETWORK_PROFILE:-local}
      MYCOMESH_NETWORK_ID: ${MYCOMESH_NETWORK_ID:-mycomesh-local}
      MYCOMESH_PUBLIC_NODE_STRICT: ${MYCOMESH_PUBLIC_NODE_STRICT:-false}
      MYCOMESH_RELAY_EXTRA_ARGS: ${MYCOMESH_RELAY_EXTRA_ARGS---allow-any-signed-consumer}
      MYCOMESH_RELAY_ADVERTISE_HOST: ${MYCOMESH_RELAY_ADVERTISE_HOST:-127.0.0.1}
      MYCOMESH_RELAY_ADVERTISE_CONTROL_PORT: ${MYCOMESH_RELAY_ADVERTISE_CONTROL_PORT:-9900}
      MYCOMESH_RELAY_ADVERTISE_PROVIDER_PORT: ${MYCOMESH_RELAY_ADVERTISE_PROVIDER_PORT:-9901}
      MYCOMESH_RELAY_PUBLIC_URL: ${MYCOMESH_RELAY_PUBLIC_URL:-http://127.0.0.1:9900}
      MYCOMESH_RELAY_CONSUMER_PUBLIC_KEYS: ${MYCOMESH_RELAY_CONSUMER_PUBLIC_KEYS:-}
      MYCOMESH_RELAY_ALLOW_ANY_SIGNED_CONSUMER: ${MYCOMESH_RELAY_ALLOW_ANY_SIGNED_CONSUMER:-false}
      MYCOMESH_RELAY_CORS_ALLOWED_ORIGINS: ${MYCOMESH_RELAY_CORS_ALLOWED_ORIGINS:-}
      MYCOMESH_RELAY_V3_ADMISSION_DEPLOYMENT: ${MYCOMESH_RELAY_V3_ADMISSION_DEPLOYMENT:-/app/deployments/sepolia-myco-v3.json}
      MYCOMESH_RELAY_V3_ADMISSION_RPC_URL: ${MYCOMESH_RELAY_V3_ADMISSION_RPC_URL:-}
      MYCOMESH_RELAY_V3_ADMISSION_CONFIRMATIONS: ${MYCOMESH_RELAY_V3_ADMISSION_CONFIRMATIONS:-6}
      MYCOMESH_RELAY_V3_ADMISSION_RPC_TIMEOUT: ${MYCOMESH_RELAY_V3_ADMISSION_RPC_TIMEOUT:-20}
      MYCOMESH_RELAY_TRUST_PROXY_HEADERS: ${MYCOMESH_RELAY_TRUST_PROXY_HEADERS:-false}
      MYCOMESH_RELAY_CONTROL_BIND_ADDRESS: ${MYCOMESH_RELAY_CONTROL_BIND_ADDRESS:-127.0.0.1}
      MYCOMESH_RELAY_PROVIDER_BIND_ADDRESS: ${MYCOMESH_RELAY_PROVIDER_BIND_ADDRESS:-127.0.0.1}
      MYCOMESH_REPLAY_DB: /data/relay-replay.sqlite3
    ports:
      - "127.0.0.1:9900:9900"
      - "127.0.0.1:19901:9901"
    volumes:
      - mycomesh-relay-data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      public-node-volume-init:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; value=json.load(urllib.request.urlopen('http://127.0.0.1:9900/health', timeout=3)); assert value.get('ok') is True; assert isinstance(value.get('providers'), int)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu
        umask 077

        profile="$${MYCOMESH_NETWORK_PROFILE:-local}"
        extra_args="$${MYCOMESH_RELAY_EXTRA_ARGS-}"
        set -- python -m gateway relay serve \
          --host 0.0.0.0 \
          --advertise-host "$${MYCOMESH_RELAY_ADVERTISE_HOST:-127.0.0.1}" \
          --control-port 9900 \
          --provider-port 9901 \
          --advertise-control-port "$${MYCOMESH_RELAY_ADVERTISE_CONTROL_PORT:-9900}" \
          --advertise-provider-port "$${MYCOMESH_RELAY_ADVERTISE_PROVIDER_PORT:-9901}"

        if [ "$${MYCOMESH_PUBLIC_NODE_STRICT:-false}" = "true" ] && [ "$$profile" != "testnet" ]; then
          echo "relay preflight: public-node requires MYCOMESH_NETWORK_PROFILE=testnet" >&2
          exit 64
        fi

        case "$$profile" in
          local)
            set -f
            exec "$$@" $$extra_args
            ;;
          testnet)
            [ -z "$$extra_args" ] || {
              echo "relay preflight: MYCOMESH_RELAY_EXTRA_ARGS must be empty in testnet" >&2
              exit 64
            }
            python -c 'import sys; from urllib.parse import urlsplit; from gateway.gateway_registry import normalize_gateway_url; value=sys.argv[1]; canonical=normalize_gateway_url(value, allow_localhost=False)[:-3]; parsed=urlsplit(value); expected=sys.argv[2].lower(); raise SystemExit(0 if value == canonical and parsed.hostname == expected else "relay preflight: public URL must be a canonical HTTPS origin matching advertise host")' \
              "$${MYCOMESH_RELAY_PUBLIC_URL:?relay preflight: MYCOMESH_RELAY_PUBLIC_URL is required}" \
              "$${MYCOMESH_RELAY_ADVERTISE_HOST:?relay preflight: MYCOMESH_RELAY_ADVERTISE_HOST is required}"
            : "$${MYCOMESH_REPLAY_DB:?relay preflight: persistent MYCOMESH_REPLAY_DB is required}"
            [ -r "$${MYCOMESH_RELAY_V3_ADMISSION_DEPLOYMENT:?relay preflight: V3 admission deployment is required}" ] || {
              echo "relay preflight: V3 admission deployment is not readable" >&2
              exit 64
            }
            : "$${MYCOMESH_RELAY_V3_ADMISSION_RPC_URL:?relay preflight: V3 admission RPC URL is required}"
            set -- "$$@" \
              --v3-admission-deployment "$${MYCOMESH_RELAY_V3_ADMISSION_DEPLOYMENT}" \
              --v3-admission-rpc-url "$${MYCOMESH_RELAY_V3_ADMISSION_RPC_URL}" \
              --v3-admission-confirmations "$${MYCOMESH_RELAY_V3_ADMISSION_CONFIRMATIONS:-6}" \
              --v3-admission-rpc-timeout "$${MYCOMESH_RELAY_V3_ADMISSION_RPC_TIMEOUT:-20}"

            if [ "$${MYCOMESH_PUBLIC_NODE_STRICT:-false}" = "true" ]; then
              [ "$${MYCOMESH_RELAY_CORS_ALLOWED_ORIGINS:-}" = "https://mycomesh.xyz,https://app.mycomesh.xyz,http://127.0.0.1:8110,http://localhost:8110" ] || {
                echo "relay preflight: public-node browser origins must be the canonical mycomesh.xyz origins" >&2
                exit 64
              }
              [ "$${MYCOMESH_RELAY_CONTROL_BIND_ADDRESS:-}" = "127.0.0.1" ] || {
                echo "relay preflight: public-node Relay control port must bind to 127.0.0.1" >&2
                exit 64
              }
              [ "$${MYCOMESH_RELAY_PROVIDER_BIND_ADDRESS:-}" = "127.0.0.1" ] || {
                echo "relay preflight: TLS-terminated Relay Provider backend must bind to 127.0.0.1" >&2
                exit 64
              }
              [ "$${MYCOMESH_RELAY_ADVERTISE_CONTROL_PORT:-}" = "443" ] || {
                echo "relay preflight: public-node Relay control audience must be HTTPS port 443" >&2
                exit 64
              }
              [ "$${MYCOMESH_RELAY_ADVERTISE_PROVIDER_PORT:-}" = "9901" ] || {
                echo "relay preflight: public-node Relay Provider audience must be port 9901" >&2
                exit 64
              }
              [ "$${MYCOMESH_RELAY_TRUST_PROXY_HEADERS:-false}" = "true" ] || {
                echo "relay preflight: public-node requires trusted X-Real-IP from its same-host Nginx proxy" >&2
                exit 64
              }
              case "$${MYCOMESH_REPLAY_DB:-}" in
                *change-me-database-password*)
                  echo "relay preflight: replace the default password in MYCOMESH_REPLAY_DB" >&2
                  exit 64
                  ;;
              esac
            fi

            case "$${MYCOMESH_RELAY_ALLOW_ANY_SIGNED_CONSUMER:-false}" in
              true)
                set -- "$$@" --allow-any-signed-consumer
                ;;
              false)
                consumer_count=0
                old_ifs="$$IFS"
                IFS=,
                for public_key in $${MYCOMESH_RELAY_CONSUMER_PUBLIC_KEYS:-}; do
                  [ -n "$$public_key" ] || continue
                  set -- "$$@" --consumer-public-key "$$public_key"
                  consumer_count=$$((consumer_count + 1))
                done
                IFS="$$old_ifs"
                ;;
              *) echo "relay preflight: MYCOMESH_RELAY_ALLOW_ANY_SIGNED_CONSUMER must be true or false" >&2; exit 64 ;;
            esac
            case "$${MYCOMESH_RELAY_TRUST_PROXY_HEADERS:-false}" in
              true) set -- "$$@" --trust-proxy-headers ;;
              false) ;;
              *) echo "relay preflight: MYCOMESH_RELAY_TRUST_PROXY_HEADERS must be true or false" >&2; exit 64 ;;
            esac
            exec "$$@"
            ;;
          *)
            echo "relay preflight: unsupported network profile: $$profile" >&2
            exit 64
            ;;
        esac

