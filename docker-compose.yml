      GATEWAY_UVICORN_LIMIT_CONCURRENCY: ${GATEWAY_UVICORN_LIMIT_CONCURRENCY:-128}
      GATEWAY_UVICORN_KEEP_ALIVE_SECONDS: ${GATEWAY_UVICORN_KEEP_ALIVE_SECONDS:-5}
      GATEWAY_UVICORN_H11_MAX_INCOMPLETE_EVENT_BYTES: ${GATEWAY_UVICORN_H11_MAX_INCOMPLETE_EVENT_BYTES:-65536}
      CODEX_MAX_CONCURRENT_PROCESSES: "1"
      CODEX_STDOUT_MAX_BYTES: ${CODEX_STDOUT_MAX_BYTES:-8388608}
      CODEX_STDERR_MAX_BYTES: ${CODEX_STDERR_MAX_BYTES:-1048576}
      CODEX_APP_SERVER_STDOUT_MAX_BYTES: ${CODEX_APP_SERVER_STDOUT_MAX_BYTES:-33554432}
      CODEX_APP_SERVER_STDERR_RETAIN_BYTES: ${CODEX_APP_SERVER_STDERR_RETAIN_BYTES:-1048576}
      CODEX_APP_SERVER_MAX_MESSAGES: ${CODEX_APP_SERVER_MAX_MESSAGES:-100000}
      CODEX_APP_SERVER_MAX_PENDING_TURNS: ${CODEX_APP_SERVER_MAX_PENDING_TURNS:-8}
      CODEX_APP_SERVER_PENDING_TTL_SECONDS: ${CODEX_APP_SERVER_PENDING_TTL_SECONDS:-300}
      AGENT_KEYS: ${AGENT_KEYS:-coder=change-me-coder-key}
      HOST: 127.0.0.1
      PORT: 8000
      AGENTS_FILE: /data/agents.json
      SESSION_DB: /data/sessions.sqlite3
      CODEX_HOME: /data/codex-home
      CODEX_WORKDIR: /workspace
      MYCOMESH_CHANNEL: ${MYCOMESH_CHANNEL:-codex-standard-v1}
      MYCOMESH_NETWORK_PROFILE: ${MYCOMESH_NETWORK_PROFILE:-local}
      MYCOMESH_NETWORK_ID: ${MYCOMESH_NETWORK_ID:-mycomesh-local}
      MYCOMESH_PROVIDER_NETWORK_CONFIG: ${MYCOMESH_PROVIDER_NETWORK_CONFIG-}
      MYCOMESH_PROVIDER_EVM_IDENTITY: ${MYCOMESH_PROVIDER_EVM_IDENTITY:-/data/provider-evm-identity.json}
      MYCOMESH_PROVIDER_POOL_URL: ${MYCOMESH_PROVIDER_POOL_URL-}
      MYCOMESH_PROVIDER_TRANSPORT: ${MYCOMESH_PROVIDER_TRANSPORT-}
      MYCOMESH_PROVIDER_ADVERTISE_HOST: ${MYCOMESH_PROVIDER_ADVERTISE_HOST:-auto}
      MYCOMESH_PROVIDER_ADVERTISE_PORT: ${MYCOMESH_PROVIDER_ADVERTISE_PORT:-9700}
      MYCOMESH_PROVIDER_BIND_ADDRESS: ${MYCOMESH_PROVIDER_BIND_ADDRESS:-127.0.0.1}
      MYCOMESH_PROVIDER_AGENT: ${MYCOMESH_PROVIDER_AGENT:-coder}
      MYCOMESH_PROVIDER_CAPACITY: ${MYCOMESH_PROVIDER_CAPACITY:-1}
      MYCOMESH_PROVIDER_IDENTITY: ${MYCOMESH_PROVIDER_IDENTITY:-/data/node-identity.json}
      MYCOMESH_PROVIDER_RUN_DIR: ${MYCOMESH_PROVIDER_RUN_DIR:-/data/run}
      MYCOMESH_PROVIDER_TTL_SECONDS: ${MYCOMESH_PROVIDER_TTL_SECONDS:-30}
      MYCOMESH_PROVIDER_HEARTBEAT_INTERVAL_SECONDS: ${MYCOMESH_PROVIDER_HEARTBEAT_INTERVAL_SECONDS:-10}
      MYCOMESH_PROVIDER_TIMEOUT_SECONDS: ${MYCOMESH_PROVIDER_TIMEOUT_SECONDS:-300}
      MYCOMESH_PROVIDER_CONSUMER_PUBLIC_KEY: ${MYCOMESH_PROVIDER_CONSUMER_PUBLIC_KEY:-}
      MYCOMESH_PROVIDER_PAYMENT_ADDRESS: ${MYCOMESH_PROVIDER_PAYMENT_ADDRESS:-}
      MYCOMESH_PROVIDER_PRICING_HASH: ${MYCOMESH_PROVIDER_PRICING_HASH:-}
      MYCOMESH_PROVIDER_EXTRA_ARGS: ${MYCOMESH_PROVIDER_EXTRA_ARGS-}
      MYCOMESH_REPLAY_DB: /data/provider-replay.sqlite3
      MYCOMESH_SETTLEMENT_VERSION: ${MYCOMESH_SETTLEMENT_VERSION:-2}
      MYCOMESH_PRICING_VERSION: ${MYCOMESH_PRICING_VERSION:-}
      MYCOMESH_SETTLEMENT_RPC_URL: ${MYCOMESH_SETTLEMENT_RPC_URL:-}
      MYCOMESH_SETTLEMENT_CONTRACT: ${MYCOMESH_SETTLEMENT_CONTRACT:-}
      MYCOMESH_SETTLEMENT_CHAIN_ID: ${MYCOMESH_SETTLEMENT_CHAIN_ID:-}
      MYCOMESH_SETTLEMENT_CONFIRMATIONS: ${MYCOMESH_SETTLEMENT_CONFIRMATIONS:-6}
      MYCOMESH_SETTLEMENT_RPC_TIMEOUT: ${MYCOMESH_SETTLEMENT_RPC_TIMEOUT:-20}
      ETH_CHAIN_ID: ${ETH_CHAIN_ID:-11155111}
      ETH_RPC_URL: ${ETH_RPC_URL:-}
      MYCO_DEPLOYMENT: ${MYCO_DEPLOYMENT:-/app/deployments/sepolia-myco-v3.json}
      MYCO_SETTLEMENT: ${MYCO_SETTLEMENT:-}
      MYCO_TOKEN: ${MYCO_TOKEN:-}
      MYCO_TEST_USDC: ${MYCO_TEST_USDC:-}
      MYCO_TREASURY: ${MYCO_TREASURY:-}
      MYCO_CHANNEL_HASH: ${MYCO_CHANNEL_HASH:-}
    ports:
      - "${MYCOMESH_PROVIDER_BIND_ADDRESS:-127.0.0.1}:${MYCOMESH_PROVIDER_PORT:-9700}:9700"
    volumes:
      - mycomesh-provider-data:/data
      - mycomesh-provider-workspace:/workspace
    tmpfs:
      - /tmp:size=256m,mode=1777
    depends_on:
      provider-volume-init:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          { [ "$${GATEWAY_BACKEND:-}" != "codex_app_server" ] ||
          { python -m gateway codex-provider configure --codex-home "$${CODEX_HOME:?CODEX_HOME is required}" >/dev/null &&
          python -m gateway codex-provider status --codex-home "$$CODEX_HOME" >/dev/null; }; } &&
          { if [ "$${MYCOMESH_NETWORK_PROFILE:-local}" = "local" ]; then
          python -m gateway health --url http://127.0.0.1:8000/health --timeout 3 >/dev/null;
          else
          python -m gateway health --url http://127.0.0.1:8000/health --timeout 3 --require-settlement-ready >/dev/null;
          fi; } &&
          { [ "$${MYCOMESH_PROVIDER_TRANSPORT-}" != "direct" ] ||
          python -m gateway p2p ping tcp://127.0.0.1:9700 --timeout 3 --require-bridge-ready >/dev/null; } &&
          { [ "$${MYCOMESH_NETWORK_PROFILE:-local}" = "local" ] ||
          [ "$${MYCOMESH_PROVIDER_TRANSPORT-}" = "direct" ] ||
          python -m gateway.provider_bootstrap --require-bridge-lease >/dev/null; }
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu
        umask 077

        profile="$${MYCOMESH_NETWORK_PROFILE:-local}"
        transport="$${MYCOMESH_PROVIDER_TRANSPORT-}"
        extra_args="$${MYCOMESH_PROVIDER_EXTRA_ARGS-}"

        case "$$profile" in
          local)
            [ -n "$$transport" ] || transport=direct
            ;;
          testnet)
            [ -z "$$extra_args" ] || {
              echo "provider preflight: MYCOMESH_PROVIDER_EXTRA_ARGS must be empty in testnet" >&2
              exit 64
            }
            : "$${MYCOMESH_PROVIDER_NETWORK_CONFIG:?provider preflight: published network config is required}"
            [ -r "$$MYCOMESH_PROVIDER_NETWORK_CONFIG" ] || {
              echo "provider preflight: network config is not readable: $$MYCOMESH_PROVIDER_NETWORK_CONFIG" >&2
              exit 64
            }
            case "$$transport" in
              ""|direct|relay) ;;
              *) echo "provider preflight: transport override must be direct or relay" >&2; exit 64 ;;
            esac
            [ "$${GATEWAY_BACKEND:-}" = "codex_app_server" ] || {
              echo "provider preflight: testnet requires GATEWAY_BACKEND=codex_app_server" >&2
              exit 64
            }
            [ -z "$${UPSTREAM_API_KEY:-}" ] || {
              echo "provider preflight: Codex subscription mode forbids UPSTREAM_API_KEY" >&2
              exit 64
            }
            [ -z "$${CODEX_PROVIDER_BASE_URL:-}" ] || {
              echo "provider preflight: testnet forbids a custom CODEX_PROVIDER_BASE_URL" >&2
              exit 64
            }
            : "$${PUBLIC_MODEL_ID:?provider preflight: PUBLIC_MODEL_ID is required}"
            : "$${CODEX_INTERNAL_MODEL:?provider preflight: CODEX_INTERNAL_MODEL is required}"
            [ "$${CODEX_MAX_CONCURRENT_PROCESSES:-}" = "1" ] || {
              echo "provider preflight: testnet requires CODEX_MAX_CONCURRENT_PROCESSES=1" >&2
              exit 64
            }
            [ "$${CODEX_SANDBOX:-}" = "read-only" ] || {
              echo "provider preflight: testnet requires CODEX_SANDBOX=read-only" >&2
              exit 64
            }
            [ "$${MYCOMESH_CODEX_TESTNET_METERING:-}" = "true" ] || {
              echo "provider preflight: testnet requires MYCOMESH_CODEX_TESTNET_METERING=true" >&2
              exit 64
            }
            case "$${CODEX_TESTNET_MAX_OUTPUT_TOKENS:-}" in
              ""|*[!0-9]*|0)
                echo "provider preflight: CODEX_TESTNET_MAX_OUTPUT_TOKENS must be a positive integer" >&2
                exit 64
                ;;
            esac
            : "$${MYCO_DEPLOYMENT:?provider preflight: MYCO_DEPLOYMENT is required}"
            : "$${MYCOMESH_PROVIDER_EVM_IDENTITY:?provider preflight: Provider EVM identity path is required}"
            [ "$${MYCOMESH_SETTLEMENT_VERSION:-}" = "3" ] || {
              echo "provider preflight: testnet requires MYCOMESH_SETTLEMENT_VERSION=3" >&2
              exit 64
            }
            case "$${MYCOMESH_SETTLEMENT_CONFIRMATIONS:-}" in
              ""|*[!0-9]*)
                echo "provider preflight: MYCOMESH_SETTLEMENT_CONFIRMATIONS must be an integer" >&2
                exit 64
                ;;
            esac
            [ "$$MYCOMESH_SETTLEMENT_CONFIRMATIONS" -ge 6 ] || {
              echo "provider preflight: testnet requires at least 6 settlement confirmations" >&2
              exit 64
            }
            [ -r "$$MYCO_DEPLOYMENT" ] || {
              echo "provider preflight: deployment record is not readable: $$MYCO_DEPLOYMENT" >&2
              exit 64
            }
            if [ "$$transport" = "direct" ]; then
              case "$$MYCOMESH_PROVIDER_BIND_ADDRESS" in
                127.*|localhost) echo "provider preflight: direct Provider port must bind publicly" >&2; exit 64 ;;
              esac
              case "$$MYCOMESH_PROVIDER_ADVERTISE_HOST" in
                auto) ;;
                *)
                  python -c 'import ipaddress, sys; address = ipaddress.ip_address(sys.argv[1]); raise SystemExit(0 if address.version == 4 and address.is_global else "provider preflight: direct advertise host must be auto or a literal public IPv4 address")' \
                    "$$MYCOMESH_PROVIDER_ADVERTISE_HOST"
                  ;;
              esac
            fi
            case "$$extra_args" in
              *--allow-any-signed-consumer*|*--allow-unsigned-requests*|*--allow-unreserved-requests*)
                echo "provider preflight: development allow flags are forbidden in testnet" >&2
                exit 64
                ;;
            esac
            ;;
          *)
            echo "provider preflight: unsupported network profile: $$profile" >&2
            exit 64
            ;;
        esac

        if [ "$${GATEWAY_BACKEND:-}" = "codex_app_server" ] || [ "$${GATEWAY_BACKEND:-}" = "codex_cli" ]; then
          python -m gateway codex-provider configure --codex-home "$${CODEX_HOME:?CODEX_HOME is required}"
          python -m gateway codex-provider status --codex-home "$$CODEX_HOME" || {
            echo "provider preflight: run 'make provider-login' to establish an isolated ChatGPT login" >&2
            exit 64
          }
        fi

        set -- python -m gateway provider start \
          --skip-login \
          --gateway-host 127.0.0.1 \
          --gateway-port 8000 \
          --provider-host 0.0.0.0 \
          --provider-port 9700 \
          --advertise-host "$${MYCOMESH_PROVIDER_ADVERTISE_HOST:-auto}" \
          --advertise-port "$${MYCOMESH_PROVIDER_ADVERTISE_PORT:-9700}" \
          --agent "$${MYCOMESH_PROVIDER_AGENT:-coder}" \
          --network-profile "$${MYCOMESH_NETWORK_PROFILE:-local}" \
          --channel "$${MYCOMESH_CHANNEL:-codex-standard-v1}" \
          --capacity "$${MYCOMESH_PROVIDER_CAPACITY:-1}" \
          --timeout "$${MYCOMESH_PROVIDER_TIMEOUT_SECONDS:-300}" \
          --identity "$${MYCOMESH_PROVIDER_IDENTITY:-/data/node-identity.json}" \
          --run-dir "$${MYCOMESH_PROVIDER_RUN_DIR:-/data/run}" \
          --ttl "$${MYCOMESH_PROVIDER_TTL_SECONDS:-30}" \
          --heartbeat-interval "$${MYCOMESH_PROVIDER_HEARTBEAT_INTERVAL_SECONDS:-10}"

        if [ -n "$${MYCOMESH_PROVIDER_NETWORK_CONFIG:-}" ]; then
          set -- "$$@" --network-config "$$MYCOMESH_PROVIDER_NETWORK_CONFIG" \
            --evm-identity "$${MYCOMESH_PROVIDER_EVM_IDENTITY:-/data/provider-evm-identity.json}"
        fi
        if [ -n "$$transport" ]; then
          set -- "$$@" --transport "$$transport"
        fi
        if [ -n "$${MYCOMESH_PROVIDER_POOL_URL:-}" ]; then
          set -- "$$@" --pool "$$MYCOMESH_PROVIDER_POOL_URL"
        fi

        if [ -n "$${MYCOMESH_PROVIDER_CONSUMER_PUBLIC_KEY:-}" ]; then
          set -- "$$@" --consumer-public-key "$$MYCOMESH_PROVIDER_CONSUMER_PUBLIC_KEY"
        fi
        if [ -n "$${MYCOMESH_PROVIDER_PAYMENT_ADDRESS:-}" ]; then
          set -- "$$@" --payment-address "$$MYCOMESH_PROVIDER_PAYMENT_ADDRESS"
        fi
        if [ -n "$${MYCOMESH_PROVIDER_PRICING_HASH:-}" ]; then
          set -- "$$@" --pricing-hash "$$MYCOMESH_PROVIDER_PRICING_HASH"
        fi

        set -f
        exec "$$@" $$extra_args

volumes:
  mycomesh-gateway-data:
  mycomesh-consumer-data:
  mycomesh-proxy-data:
  mycomesh-indexer-data:
  mycomesh-postgres-data:
  mycomesh-bridge-data:
  mycomesh-relay-data:
  mycomesh-provider-data:
  mycomesh-provider-workspace:

networks:
  gateway-net:
  consumer-net:
  proxy-net:
  bridge-net:
  relay-net:
  provider-net:
