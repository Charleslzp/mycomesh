services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    profiles: ["proxy"]
    networks:
      - proxy-net
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 1g
    cpus: "2.0"
    logging: *production-logging
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${MYCOMESH_POSTGRES_DB:-mycomesh}
      POSTGRES_USER: ${MYCOMESH_POSTGRES_USER:-mycomesh}
      POSTGRES_PASSWORD: ${MYCOMESH_POSTGRES_PASSWORD:-change-me-database-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - mycomesh-postgres-data:/var/lib/postgresql/data

  gateway:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["gateway"]
    networks:
      - gateway-net
    user: "0:0"
    environment:
      <<: *gateway-env
      HOST: 0.0.0.0
      PORT: 8000
      AGENTS_FILE: /data/agents.json
      SESSION_DB: /data/sessions.sqlite3
      CODEX_HOME: /data/codex-home
      CODEX_WORKDIR: /workspace
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8000}:8000"
    volumes:
      - mycomesh-gateway-data:/data
      - ${MYCOMESH_WORKSPACE:-.}:/workspace
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]

  proxy-volume-init:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["proxy"]
    user: "0:0"
    network_mode: none
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    volumes:
      - mycomesh-proxy-data:/volumes/proxy
      - mycomesh-indexer-data:/volumes/indexer
    entrypoint:
      - /bin/sh
      - -ec
      - |
        identity=/volumes/proxy/request-identity.json
        manifest=/app/deployments/sepolia-provider-network.json
        [ -s "$$identity" ] || {
          echo "proxy volume init: request identity is required; migrate the pinned identity before starting Proxy" >&2
          exit 64
        }
        python -m gateway.proxy_identity validate --identity "$$identity" --manifest "$$manifest" >/dev/null
        chown -R 10001:10001 /volumes/proxy /volumes/indexer

  public-node-volume-init:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["bridge", "relay", "public-node"]
    user: "0:0"
    network_mode: none
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    volumes:
      - mycomesh-bridge-data:/volumes/bridge
      - mycomesh-relay-data:/volumes/relay
    entrypoint:
      - /bin/sh
      - -ec
      - |
        chown -R 10001:10001 /volumes/bridge /volumes/relay

  provider-volume-init:
    build: .
    image: ${MYCOMESH_PROVIDER_IMAGE:-mycomesh/gateway:local}
    profiles: ["provider"]
    user: "0:0"
    network_mode: none
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    volumes:
      - mycomesh-provider-data:/volumes/provider
      - mycomesh-provider-workspace:/volumes/workspace
    entrypoint:
      - /bin/sh
      - -ec
      - |
        chown -R 10001:10001 /volumes/provider /volumes/workspace

  consumer-volume-init:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["consumer"]
    user: "0:0"
    network_mode: none
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    volumes:
      - mycomesh-consumer-data:/volumes/consumer
    entrypoint:
      - /bin/sh
      - -ec
      - |
        chown -R 10001:10001 /volumes/consumer

  consumer:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["consumer"]
    networks:
      - consumer-net
    user: "10001:10001"
    restart: unless-stopped
    pids_limit: 128
    mem_limit: 256m
    cpus: "1.0"
    logging: *production-logging
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: /data
    environment:
      MYCOMESH_CONSUMER_DATA_DIR: /data
      MYCOMESH_CONSUMER_NETWORK_CONFIG: /app/deployments/sepolia-provider-network.json
      MYCOMESH_CONSUMER_PUBLIC_BASE_URL: http://127.0.0.1:8110/v1
      MYCOMESH_CONSUMER_WEB_DIR: /app/web
      MYCOMESH_CONSUMER_MAX_REQUEST_BYTES: ${MYCOMESH_CONSUMER_MAX_REQUEST_BYTES:-1048576}
      MYCOMESH_CONSUMER_REQUEST_BODY_TIMEOUT_SECONDS: ${MYCOMESH_CONSUMER_REQUEST_BODY_TIMEOUT_SECONDS:-30}
    ports:
      - "127.0.0.1:8110:8110"
    volumes:
      - mycomesh-consumer-data:/data
    tmpfs:
      - /tmp:size=32m,mode=1777
    depends_on:
      consumer-volume-init:
        condition: service_completed_successfully
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; value=json.load(urllib.request.urlopen('http://127.0.0.1:8110/health', timeout=3)); assert value.get('ok') is True; assert value.get('gateway_dependency') is False; assert value.get('browser_app_ready') is True"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s
    entrypoint: ["python", "-m", "gateway.local_consumer"]
    command: ["serve", "--host", "0.0.0.0", "--port", "8110"]

  proxy:
    build: .
    image: ${MYCOMESH_NODE_IMAGE:-mycomesh/gateway:local}
    profiles: ["proxy"]
    networks:
      - proxy-net
    user: "10001:10001"
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 1g
    cpus: "2.0"
    logging: *production-logging
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: /data
    environment:
      PUBLIC_MODEL_ID: mycomesh-codex-standard-v1
      MYCOMESH_PUBLIC_MODEL_ID: mycomesh-codex-standard-v1
      MYCOMESH_RESERVE_INPUT_TOKENS: "8000"
      MYCOMESH_RESERVE_OUTPUT_TOKENS: "2000"
      MYCOMESH_CHANNEL: ${MYCOMESH_CHANNEL:-codex-standard-v1}
      MYCOMESH_NETWORK_PROFILE: testnet
      MYCOMESH_NETWORK_ID: mycomesh-testnet
      MYCOMESH_CORS_ALLOWED_ORIGINS: ${MYCOMESH_CORS_ALLOWED_ORIGINS:-}
      MYCOMESH_ADMIN_TOKEN: ${MYCOMESH_ADMIN_TOKEN:-change-me-admin-token}
      MYCOMESH_BILLING_MODE: onchain-prepaid
      MYCOMESH_BILLING_DB: ${MYCOMESH_BILLING_DB:-postgresql://mycomesh:change-me-database-password@postgres:5432/mycomesh}
      MYCOMESH_ALLOW_LOCAL_BALANCE_CACHE: "1"
      MYCOMESH_CHAIN_SYNC_MAX_AGE_SECONDS: ${MYCOMESH_CHAIN_SYNC_MAX_AGE_SECONDS:-120}
      MYCOMESH_CHAIN_SYNC_MAX_BLOCK_LAG: ${MYCOMESH_CHAIN_SYNC_MAX_BLOCK_LAG:-12}
      MYCOMESH_CHAIN_SYNC_MIN_CONFIRMATIONS: ${MYCOMESH_CHAIN_SYNC_MIN_CONFIRMATIONS:-6}
      MYCOMESH_PUBLIC_KEY_REGISTRATION: ${MYCOMESH_PUBLIC_KEY_REGISTRATION:-false}
      MYCOMESH_KEY_CHALLENGE_CAPACITY: ${MYCOMESH_KEY_CHALLENGE_CAPACITY:-1024}
      MYCOMESH_KEY_CHALLENGE_RATE_PER_MINUTE: ${MYCOMESH_KEY_CHALLENGE_RATE_PER_MINUTE:-120}
      MYCOMESH_KEY_REGISTRATION_RPC_CONCURRENCY: ${MYCOMESH_KEY_REGISTRATION_RPC_CONCURRENCY:-4}
      MYCOMESH_KEY_REGISTRATION_RPC_TIMEOUT: ${MYCOMESH_KEY_REGISTRATION_RPC_TIMEOUT:-20}
      MYCOMESH_KEY_REGISTRATION_MAX_ATTEMPTS: ${MYCOMESH_KEY_REGISTRATION_MAX_ATTEMPTS:-5}
      MYCOMESH_ALLOW_PUBLIC_GATEWAY_REGISTRATION: ${MYCOMESH_ALLOW_PUBLIC_GATEWAY_REGISTRATION:-false}
      MYCOMESH_PUBLIC_GATEWAY_URL: https://gateway.mycomesh.xyz/v1
      MYCOMESH_DISCOVERY_LIMIT: ${MYCOMESH_DISCOVERY_LIMIT:-5}
      MYCOMESH_POOL_URL: https://bridge.mycomesh.xyz
      MYCOMESH_MAX_REQUEST_BYTES: ${MYCOMESH_MAX_REQUEST_BYTES:-1048576}
      MYCOMESH_MAX_CONCURRENT_REQUESTS: ${MYCOMESH_MAX_CONCURRENT_REQUESTS:-128}
      MYCOMESH_REQUEST_BODY_TIMEOUT_SECONDS: ${MYCOMESH_REQUEST_BODY_TIMEOUT_SECONDS:-30}
      MYCOMESH_INFERENCE_CONCURRENCY: ${MYCOMESH_INFERENCE_CONCURRENCY:-8}
      MYCOMESH_TIMEOUT_SECONDS: ${MYCOMESH_TIMEOUT_SECONDS:-300}
      MYCOMESH_UVICORN_LIMIT_CONCURRENCY: ${MYCOMESH_UVICORN_LIMIT_CONCURRENCY:-128}
      MYCOMESH_UVICORN_KEEP_ALIVE_SECONDS: ${MYCOMESH_UVICORN_KEEP_ALIVE_SECONDS:-5}
      MYCOMESH_UVICORN_H11_MAX_INCOMPLETE_EVENT_BYTES: ${MYCOMESH_UVICORN_H11_MAX_INCOMPLETE_EVENT_BYTES:-65536}
      MYCOMESH_SETTLEMENT_VERSION: "3"
      MYCOMESH_PRICING_VERSION: ${MYCOMESH_PRICING_VERSION:-}
      MYCOMESH_SETTLEMENT_RPC_URL: ${MYCOMESH_SETTLEMENT_RPC_URL:-}
      MYCOMESH_SETTLEMENT_CONTRACT: ${MYCOMESH_SETTLEMENT_CONTRACT:-}
      MYCOMESH_SETTLEMENT_CHAIN_ID: ${MYCOMESH_SETTLEMENT_CHAIN_ID:-}
      MYCOMESH_SETTLEMENT_CONFIRMATIONS: ${MYCOMESH_SETTLEMENT_CONFIRMATIONS:-6}
