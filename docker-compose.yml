  CODEX_APP_SERVER_STDERR_RETAIN_BYTES: ${CODEX_APP_SERVER_STDERR_RETAIN_BYTES:-1048576}
  CODEX_APP_SERVER_MAX_MESSAGES: ${CODEX_APP_SERVER_MAX_MESSAGES:-100000}
  CODEX_APP_SERVER_MAX_PENDING_TURNS: ${CODEX_APP_SERVER_MAX_PENDING_TURNS:-8}
  CODEX_APP_SERVER_PENDING_TTL_SECONDS: ${CODEX_APP_SERVER_PENDING_TTL_SECONDS:-300}
  AGENT_KEYS: ${AGENT_KEYS:-coder=change-me-coder-key}
