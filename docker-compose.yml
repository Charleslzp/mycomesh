  UPSTREAM_MAX_STREAM_BYTES: ${UPSTREAM_MAX_STREAM_BYTES:-33554432}
  CENTER_MODEL: ${CENTER_MODEL:-}
  PUBLIC_MODEL_ID: ${PUBLIC_MODEL_ID:-gpt-5.5}
  CODEX_INTERNAL_MODEL: ${CODEX_INTERNAL_MODEL:-gpt-5.5}
