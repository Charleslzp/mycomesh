limit_req_zone $binary_remote_addr zone=mycomesh_bridge:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=mycomesh_relay:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=mycomesh_gateway:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=mycomesh_registration:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=mycomesh_relay_connections:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    ssl_reject_handshake on;
}

server {
    listen 80;
    listen [::]:80;
    server_name mycomesh.xyz app.mycomesh.xyz;

    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https: wss:; font-src 'self' data:; form-action 'none'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'; worker-src 'self' blob:" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name bridge.mycomesh.xyz;
    server_tokens off;

    client_max_body_size 1m;
    client_body_timeout 15s;
    limit_req zone=mycomesh_bridge burst=40 nodelay;
    add_header X-Content-Type-Options "nosniff" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name gateway.mycomesh.xyz;
    server_tokens off;

    default_type application/json;
    add_header Cache-Control "no-store" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mycomesh.xyz app.mycomesh.xyz;
    include /etc/nginx/snippets/mycomesh-tls.conf;

    root /var/www/mycomesh;
    index index.html;
    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https: wss:; font-src 'self' data:; form-action 'none'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~* \.map$ {
        return 404;
    }

    location ~* ^/assets/.+\.(?:css|js|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bridge.mycomesh.xyz;
    include /etc/nginx/snippets/mycomesh-tls.conf;
    server_tokens off;

    client_max_body_size 1m;
    client_body_timeout 15s;
    limit_req zone=mycomesh_bridge burst=40 nodelay;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location ^~ /infer/ {
        client_max_body_size 17m;
        limit_req zone=mycomesh_relay burst=20 nodelay;
        limit_conn mycomesh_relay_connections 20;
        proxy_pass http://127.0.0.1:9900;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 305s;
        proxy_read_timeout 305s;
        proxy_buffering on;
        proxy_request_buffering on;
    }

    location / {
        proxy_pass http://127.0.0.1:9800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_buffering on;
        proxy_request_buffering on;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gateway.mycomesh.xyz;
    include /etc/nginx/snippets/mycomesh-tls.conf;
    server_tokens off;

    client_max_body_size 1m;
    client_body_timeout 30s;
    default_type application/json;
    limit_req zone=mycomesh_gateway burst=30 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = /health {
        limit_except GET {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /.well-known/mycomesh.json {
        limit_except GET OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/gateways {
        limit_except GET OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/models {
        limit_except GET OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/keys/challenge {
        limit_except POST OPTIONS {
            deny all;
        }
        limit_req zone=mycomesh_registration burst=6 nodelay;
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/keys/register {
        limit_except POST OPTIONS {
            deny all;
        }
        limit_req zone=mycomesh_registration burst=4 nodelay;
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/keys/rotate {
        limit_except POST OPTIONS {
            deny all;
        }
        limit_req zone=mycomesh_registration burst=4 nodelay;
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/keys/current {
        limit_except DELETE OPTIONS {
            deny all;
        }
        limit_req zone=mycomesh_registration burst=4 nodelay;
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /account {
        limit_except GET OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/mycomesh/v3/prepare {
        limit_except POST OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/responses {
        limit_except POST OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /v1/chat/completions {
        limit_except POST OPTIONS {
            deny all;
        }
        proxy_pass http://127.0.0.1:8100;
        include /etc/nginx/snippets/mycomesh-proxy.conf;
    }

    location = /openapi.json {
        return 404 '{"detail":"not found"}';
    }

    location ^~ /docs {
        return 404 '{"detail":"not found"}';
    }

    location ^~ /redoc {
        return 404 '{"detail":"not found"}';
    }

    location = /admin/health {
        return 404 '{"detail":"not found"}';
    }

    location ^~ /admin {
        return 404 '{"detail":"not found"}';
    }

    location ^~ /accounts {
        return 404 '{"detail":"not found"}';
    }

    location ^~ /gateways {
        return 404 '{"detail":"not found"}';
    }

    location / {
        return 404 '{"detail":"not found"}';
    }
}
